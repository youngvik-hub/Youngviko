<!DOCTYPE html>
<html>
<head>
  <title>Youngvik Hub</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #0d0d0d;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .navbar {
      background-color: black;
      padding: 20px;
      font-size: 22px;
      font-weight: bold;
      color: lime;
    }

    .hero {
      padding-top: 120px;
    }

    h1 {
      font-size: 50px;
      color: lime;
      margin-bottom: 10px;
    }

    p {
      font-size: 20px;
      color: #cccccc;
    }

    button {
      margin-top: 30px;
      padding: 15px 35px;
      font-size: 18px;
      background-color: lime;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background-color: green;
      color: white;
    }
  </style>
</head>

<body>

  <div class="navbar">
    Youngvik Hub
  </div>

  <div class="hero">
    <h1>Welcome to Youngvik Hub</h1>

    <p>
      Learning tech and building the future 🚀
    </p>

    <button>Get Started</button>
  </div>

</body>
</html>
