<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Youngvik Hub</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#111;
    color:white;
    text-align:center;
}

h1{
    margin-top:30px;
    color:gold;
    font-size:40px;
}

.cards{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
    padding:30px;
}

.card{
    width:180px;
    height:120px;
    background:white;
    border-radius:15px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
    font-weight:bold;
    color:blue;
    box-shadow:0 4px 10px rgba(0,0,0,0.3);
    cursor:pointer;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
}
</style>
</head>

<body>

<h1>Welcome to Youngvik Hub</h1>

<div class="cards">
    <div class="card">Music 💿</div>
    <div class="card">Football ⚽</div>
    <div class="card">Entertainment 🎬</div>
</div>

</body>
</html>
